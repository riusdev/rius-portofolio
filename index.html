<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rius | Web Developer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f8fafc;
color:#1f2937;
scroll-behavior:smooth;
}

section{
padding:80px 20px;
}

.container{
max-width:1200px;
margin:auto;
}

header{
background:#0f172a;
color:#fff;
text-align:center;
padding:140px 20px 100px;
}

header h1{
font-size:3.2rem;
margin-bottom:20px;
}

header p{
font-size:1.2rem;
opacity:0.9;
}

.cta{
display:inline-block;
margin-top:30px;
background:linear-gradient(135deg,#6366f1,#4f46e5);
color:#fff;
padding:14px 32px;
border-radius:10px;
font-weight:bold;
transition:0.4s;
}

.cta:hover{
transform:scale(1.05);
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

/* ABOUT */
#about{
background:#fff;
}

.about-grid{
display:grid;
grid-template-columns:1fr 2fr;
gap:40px;
align-items:center;
}

.about-grid img{
width:100%;
border-radius:16px;
}

/* PROJECT */
#projects h2{
text-align:center;
margin-bottom:60px;
font-size:2.4rem;
}

.projects-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:40px;
}

.project-card{
background:#fff;
border-radius:16px;
overflow:hidden;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
transition:0.4s;
}

.project-card:hover{
transform:translateY(-6px);
}

/* CAROUSEL */
.carousel{
position:relative;
overflow:hidden;
height:220px;
}

.carousel img{
position:absolute;
width:100%;
height:220px;
object-fit:cover;
opacity:0;
transition:opacity 0.6s ease;
}

.carousel img.active{
opacity:1;
}

.carousel img:hover{
transform:scale(1.05);
transition:transform 0.6s ease;
}

.prev, .next{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.4);
color:#fff;
border:none;
padding:8px 12px;
cursor:pointer;
border-radius:50%;
}

.prev{left:10px;}
.next{right:10px;}

.dots{
text-align:center;
position:absolute;
bottom:10px;
width:100%;
}

.dots span{
display:inline-block;
width:8px;
height:8px;
background:#ddd;
margin:0 4px;
border-radius:50%;
cursor:pointer;
}

.dots span.active{
background:#6366f1;
}

.project-info{
padding:20px;
}

.project-info h3{
margin-bottom:10px;
}

.project-info p{
font-size:0.9rem;
margin-bottom:6px;
}

footer{
background:#0f172a;
color:#fff;
text-align:center;
padding:30px;
margin-top:60px;
}

.whatsapp{
position:fixed;
bottom:24px;
right:24px;
background:#25d366;
color:#fff;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

@media(max-width:768px){
.about-grid{
grid-template-columns:1fr;
}
header h1{
font-size:2.2rem;
}
}
</style>
</head>

<body>

<header>
<h1>Rius</h1>
<p>Minimalist Elit + Luxury Bold Web Experience</p>
<a href="#projects" class="cta">View My Projects</a>
</header>

<section id="about">
<div class="container about-grid">
<img src="assets/images/domrhyuz.jpg">
<div>
<h2>Tentang Saya</h2>
<p>Saya Web Developer & UI/UX Enthusiast dengan fokus membangun pengalaman digital premium, clean, dan modern.</p>
</div>
</div>
</section>

<section id="projects">
<div class="container">
<h2>Selected Projects</h2>
<div class="projects-grid" id="projectsContainer"></div>
</div>
</section>

<footer>
© 2026 Rius. All Rights Reserved.
</footer>

<a href="https://wa.me/6281338693093" class="whatsapp"><i class="fab fa-whatsapp"></i></a>

<script>
const data=[
{title:"Business Landing Page",images:["landing-page1.jpg.jpeg","landing-page2.jpg.jpeg","landing-page3.jpg.jpeg"]},
{title:"Mini Web App – To-do List",images:["mini-web1..webp","mini-web2.webp"]},
{title:"Dashboard Analitik",images:["dashboard-analityc1.jpeg","dashboard-analityc2.jpeg"]},
{title:"Mini E-commerce Website",images:["E-commerce1.jpg.jpeg","E-commerce2.jpg.jpeg","E-commerce3.jpg.jpeg"]},
{title:"UX Case Study",images:["UX-case-study1.jpg.png","UX-case-study2.jpg.jpeg"]},
{title:"Personal Blog",images:["personal-blog1.jpg.jpeg","personal-blog2.jpg.jpeg"]},
{title:"Portfolio Klien",images:["portfolio1.jpg.jpeg","portfolio2.jpg.jpeg"]},
{title:"Mini Dashboard Mobile",images:["dashboard-mobile1.jpg.jpeg","dashboard-mobile2.jpg.jpeg"]},
{title:"Interactive Quiz App",images:["quiz-app1.jpg.png","quiz-app2.jpg.png"]},
{title:"E-learning Landing Page",images:["E-learning1.jpg.jpeg","E-learning2.jpg.jpeg"]}
];

const container=document.getElementById("projectsContainer");

data.forEach((project,index)=>{
let card=document.createElement("div");
card.className="project-card";

let slides="";
let dots="";

project.images.forEach((img,i)=>{
slides+=`<img src="assets/images/${img}" class="${i===0?'active':''}">`;
dots+=`<span class="${i===0?'active':''}" data-index="${i}"></span>`;
});

card.innerHTML=`
<div class="carousel" data-id="${index}">
${slides}
<button class="prev">&#10094;</button>
<button class="next">&#10095;</button>
<div class="dots">${dots}</div>
</div>
<div class="project-info">
<h3>${project.title}</h3>
<p>Premium web project with modern UI & interactive experience.</p>
</div>
`;

container.appendChild(card);
});

document.querySelectorAll(".carousel").forEach(carousel=>{
let images=carousel.querySelectorAll("img");
let dots=carousel.querySelectorAll(".dots span");
let current=0;

function showSlide(i){
images[current].classList.remove("active");
dots[current].classList.remove("active");
current=i;
images[current].classList.add("active");
dots[current].classList.add("active");
}

carousel.querySelector(".next").onclick=()=>{
let i=(current+1)%images.length;
showSlide(i);
};

carousel.querySelector(".prev").onclick=()=>{
let i=(current-1+images.length)%images.length;
showSlide(i);
};

dots.forEach(dot=>{
dot.onclick=()=>{
showSlide(parseInt(dot.dataset.index));
};
});

let auto=setInterval(()=>{
let i=(current+1)%images.length;
showSlide(i);
},3000);

carousel.addEventListener("mouseenter",()=>clearInterval(auto));
carousel.addEventListener("mouseleave",()=>{
auto=setInterval(()=>{
let i=(current+1)%images.length;
showSlide(i);
},3000);
});

});
</script>

</body>
</html>
